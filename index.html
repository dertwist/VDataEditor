<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VDataEditor - Untitled</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">
  <div class="app-menu-bar">
    <div class="menu-item" data-menu="file">File</div>
    <div class="menu-item" data-menu="edit">Edit</div>
    <div class="menu-item" data-menu="window">Window</div>
    <div class="menu-item" data-menu="help">Help</div>
  </div>
  <div class="menu-dropdown" id="menuFile">
    <div class="menu-dropdown-item" data-action="newDocument"><span class="menu-item-label"><span class="menu-icon" id="mi-new"></span>New</span><span class="shortcut">Ctrl+N</span></div>
    <div class="menu-sep"></div>
    <div class="menu-dropdown-item" data-action="importKV3"><span class="menu-item-label"><span class="menu-icon" id="mi-importkv3"></span>Open...</span></div>
    <div class="menu-sep"></div>
    <div class="menu-dropdown-item" data-action="saveFile"><span class="menu-item-label"><span class="menu-icon" id="mi-save"></span>Save</span><span class="shortcut">Ctrl+S</span></div>
    <div class="menu-dropdown-item" data-action="saveFileAs"><span class="menu-item-label"><span class="menu-icon" id="mi-saveas"></span>Save As...</span><span class="shortcut">Ctrl+Shift+S</span></div>
    <div class="menu-sep"></div>
    <div class="menu-dropdown-item" data-action="quit"><span class="menu-item-label"><span class="menu-icon" id="mi-quit"></span>Quit</span></div>
  </div>
  <div class="menu-dropdown" id="menuEdit">
    <div class="menu-dropdown-item" data-action="undo"><span class="menu-item-label"><span class="menu-icon" id="mi-undo"></span>Undo</span><span class="shortcut">Ctrl+Z</span></div>
    <div class="menu-dropdown-item" data-action="redo"><span class="menu-item-label"><span class="menu-icon" id="mi-redo"></span>Redo</span><span class="shortcut">Ctrl+Shift+Z</span></div>
  </div>
  <div class="menu-dropdown" id="menuWindow">
    <div class="menu-dropdown-item" data-action="minimize"><span class="menu-item-label"><span class="menu-icon" id="mi-minimize"></span>Minimize</span></div>
    <div class="menu-dropdown-item" data-action="zoom"><span class="menu-item-label"><span class="menu-icon" id="mi-zoom"></span>Zoom</span></div>
    <div class="menu-dropdown-item" data-action="fullscreen"><span class="menu-item-label"><span class="menu-icon" id="mi-fullscreen"></span>Toggle Full Screen</span></div>
  </div>
  <div class="menu-dropdown" id="menuHelp">
    <div class="menu-dropdown-item" data-action="about"><span class="menu-item-label"><span class="menu-icon" id="mi-about"></span>About VDataEditor</span></div>
  </div>
  <div class="dock-container" id="dockContainer">
    <div class="dock-panel panel" id="propsPanel" style="flex:1;min-width:280px;border-right:1px solid var(--border-subtle);background:var(--bg-secondary)">
      <div class="dock-handle" data-dock-id="properties">
        <span class="dock-handle-title">Property Editor</span>
        <div class="dock-handle-actions dock-handle-actions-grow">
          <input type="search" id="propTreeSearch" placeholder="Search…" class="prop-tree-search-inline" autocomplete="off" />
          <button id="tb-undock-properties" onclick="undockPanel('properties')" title="Undock"></button>
        </div>
      </div>
      <div class="panel-body prop-tree-panel" id="propsContainer">
        <div id="propTreeRoot" class="prop-tree"></div>
      </div>
    </div>
    <div class="dock-resize-h" data-resize="props-editors"></div>
    <div class="dock-panel panel" id="editorsPanel" style="width:380px;min-width:220px;background:var(--bg-secondary)">
      <div class="dock-handle" data-dock-id="editors">
        <span class="dock-handle-title">Source</span>
        <div class="dock-handle-actions">
          <button id="tb-undock-editors" onclick="undockPanel('editors')" title="Undock"></button>
        </div>
      </div>
      <div class="panel-tabs">
        <button class="panel-tab active" onclick="switchTab(this,'jsonEdit')">JSON Edit</button>
        <button class="panel-tab" onclick="switchTab(this,'kv3Tab')">KV3</button>
      </div>
      <div class="tab-content active" id="jsonEdit"><textarea class="code-area" id="jsonEditor" spellcheck="false"></textarea><div style="padding:6px;flex-shrink:0;border-top:1px solid var(--border-subtle)"><button class="btn btn-sm btn-accent" onclick="applyJSONEdit()">Apply Changes</button></div></div>
      <div class="tab-content" id="kv3Tab"><textarea class="code-area" id="kv3Editor" spellcheck="false" readonly></textarea><div style="padding:6px;flex-shrink:0;border-top:1px solid var(--border-subtle);display:flex;gap:4px"><button class="btn btn-sm" onclick="copyKV3()">Copy KV3</button><button class="btn btn-sm btn-accent" onclick="applyKV3Edit()">Apply KV3</button></div></div>
    </div>
  </div>
  <div class="footer">
    <span id="statusBar">Ready</span>
    <span id="versionLabel">VDataEditor</span>
  </div>
</div>
<input type="file" id="fileInput" accept=".json,.vsmart,.vdata,.vpcf,.kv3,.vsurf,.vsndstck,.vpulse,.txt" style="display:none">
<script src="format/kv3.js"></script>
<script src="src/model/kv3-node.js"></script>
<script src="src/model/kv3-document.js"></script>
<script src="src/formats/registry.js"></script>
<script src="icons.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
  function setIcon(id, icon) {
    var el = document.getElementById(id);
    if (el && icon) el.innerHTML = icon;
  }
  setIcon('tb-undock-properties', ICONS.undock);
  setIcon('tb-undock-editors', ICONS.undock);
  setIcon('mi-new',       ICONS.filePlus);
  setIcon('mi-importkv3', ICONS.fileImport);
  setIcon('mi-save',      ICONS.save);
  setIcon('mi-saveas',    ICONS.saveAs);
  setIcon('mi-quit',      ICONS.power);
  setIcon('mi-undo',   ICONS.undo);
  setIcon('mi-redo',   ICONS.redo);
  setIcon('mi-minimize',   ICONS.windowMinimize);
  setIcon('mi-zoom',       ICONS.windowMaximize);
  setIcon('mi-fullscreen', ICONS.fullscreen);
  setIcon('mi-about', ICONS.info);
});
</script>
<script src="editor.js"></script>
</body>
</html>
